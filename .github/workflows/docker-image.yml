name: Publish Docker image

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  build:
    name: Publish branch Docker image
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Compute build metadata
        id: build_meta
        run: echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN_SYNC_ENGINE }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: stripe/sync-engine
          tags: |
            # `latest` stays on the manual release workflow. This workflow keeps
            # branch tags (for example `v2`) and sha tags fresh for pre-release testing.
            type=sha,format=long,prefix=
            type=ref,event=branch

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build_meta.outputs.build_date }}
            COMMIT_URL=${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify published image platforms
        run: |
          platforms="$(docker buildx imagetools inspect "stripe/sync-engine@${{ steps.build.outputs.digest }}" --raw \
            | jq -r '.manifests[].platform | select(.os != null and .architecture != null) | "\(.os)/\(.architecture)"')"
          printf '%s\n' "$platforms"
          printf '%s\n' "$platforms" | grep -Fx 'linux/amd64'
          printf '%s\n' "$platforms" | grep -Fx 'linux/arm64'
